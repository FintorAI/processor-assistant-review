step:
  id: STEP_03
  name: 1003 URLA Lender
  phase: DATA_REVIEW
  description: >
    Review and populate the 1003 URLA Lender section. Sets how title will be
    held: Estate Will Be Held In (field 1066, normally FeeSimple) and Manner in
    Which Title Will Be Held (field 33 + URLA.X138, computed from property state,
    marital status, co-borrower/NBS presence, and borrower sex). This is the
    single owner of the manner-held value — Borrower Vesting (later step) reads
    field 33 and never recomputes it. Also surfaces Attachment Type and Property
    Type for verification against the listing.

substeps:
- id: '3.1'
  name: Update 1003 URLA Lender
  tool: update_urla_lender
  description: >
    Compute and write Manner in Which Title Will Be Held (field 33) + URLA.X138
    from property state, marital status, co-borrower presence, NBS flag, and
    borrower sex (written when empty; NV forces As Joint Tenants for married
    couples). Auto-set Estate Will Be Held In (field 1066) to FeeSimple for
    standard residential loans. Surface Attachment Type (CX.ATTACHMENT.TYPE) and
    Property Type (field 1041) for verification against the listing.
  los_fields_read:
  # ── Property / context for manner-held computation ────────────────────
  - key: property_state
    field_id: '14'
    field_name: Property State
    category: property
    purpose: State-specific manner-held rules (community property, joint tenants, tenancy by entirety)
  - key: marital_status
    field_id: '479'
    field_name: Borrower Marital Status
    category: borrower_info
    purpose: Married / Unmarried / Separated (Vesting form, field 479) — fallback for manner held
  - key: borrower_marital_status
    field_id: '52'
    field_name: Borrower Marital Status
    category: borrower_info
    purpose: Borrower Summary marital status (field 52) — preferred source for manner held (notes.txt:623)
  - key: borrower_sex
    field_id: '471'
    field_name: Borrower Sex
    category: borrower_info
    purpose: His/Her sole-and-separate and unmarried/married man/woman wording
  - key: coborrower_sex
    field_id: '478'
    field_name: Co-Borrower Sex
    category: borrower_info
    purpose: Used with borrower_sex for spouse vesting wording
  - key: coborrower_first_name
    field_id: '4004'
    field_name: Co-Borrower First Name
    category: borrower_info
    purpose: Presence determines joint vs sole manner held
  - key: coborrower_last_name
    field_id: '4006'
    field_name: Co-Borrower Last Name
    category: borrower_info
    purpose: Presence determines joint vs sole manner held
  - key: nbs_flag
    field_id: CX.NBSFLAG
    field_name: Non-Borrowing Spouse Flag
    category: borrower_info
    purpose: YES if NBS exists on title without being a co-borrower
  - key: nbs_info
    field_id: CX.NBSINFO
    field_name: Non-Borrowing Spouse Name
    category: borrower_info
    purpose: NBS presence affects manner held (both on title)
  # ── Lender-form fields written / surfaced ─────────────────────────────
  - key: manner_of_title
    field_id: '33'
    field_name: Manner in Which Title Will Be Held
    category: title
    purpose: >
      Computed and written here when empty (NV forces As Joint Tenants for
      married couples). URLA.X138 = the same data shown on the 1003 URLA Lender
      form — always written together with field 33. Borrower Vesting reads this.
  - key: estate_held
    field_id: '1066'
    field_name: Estate Will Be Held In
    category: title
    purpose: Auto-set to FeeSimple for standard residential loans (blank or Leasehold)
  - key: property_type
    field_id: '1041'
    field_name: Property Type
    category: property
    purpose: Surface for verification against the listing (Attachment/Property Type)
  - key: attachment_type
    field_id: CX.ATTACHMENT.TYPE
    field_name: Attachment Type (Attached/Detached)
    category: property
    purpose: Surface for verification against the listing
  doc_types: []
  rules:
  - name: Manner Held Computed from State and Marital Status
    type: custom
    logic: >
      Field 33 (Manner Held) is computed from property state, marital status,
      co-borrower presence, NBS flag, and borrower sex. Write only if empty.
      Community property states: AZ, CA, ID, LA, NV, NM, TX, WA, WI.
      NV married couples → As Joint Tenants (force overwrite). Flag mismatch for
      others. Always write URLA.X138 (Lender-form enum) together with field 33.
  - name: Estate Will Be Held In = Fee Simple
    type: value_set
    logic: >
      Field 1066 (Estate Will Be Held In) is set to FeeSimple for standard
      residential loans whenever it is blank or Leasehold.
  - name: Attachment Type / Property Type vs Listing
    type: custom
    logic: >
      Surface Attachment Type (CX.ATTACHMENT.TYPE) and Property Type (field 1041)
      for the processor to verify against the property listing. Automated
      validation is a TODO (not implemented).
  flags:
  - title: Manner Held Auto-Set
    severity: info
    condition: Field 33 was empty and a computed manner held was written
    suggestion: Verify manner held matches title/vesting intent
  - title: Manner Held Mismatch
    severity: warning
    condition: Field 33 does not match computed manner held for state/marital status
    suggestion: Update Manner Held (field 33) or confirm with team lead
  - title: Estate Auto-Set to Fee Simple
    severity: info
    condition: Field 1066 was blank or Leasehold and was set to FeeSimple
    suggestion: Confirm Fee Simple is appropriate for this property
  field_updates:
  - field_id: '33'
    value: '{computed_manner_held}'
    condition: empty
  - field_id: URLA.X138
    value: '{computed_manner_urla_x138}'
    condition: empty
  - field_id: '1066'
    value: FeeSimple
    condition: empty or Leasehold

- id: '3.2'
  name: Complete 1003 HUD Addendum
  tool: update_hud_addendum
  description: >
    Verify and auto-write the 1003 HUD Addendum for FHA and VA loans. Sets Agency
    Type (1711), Lender ID Code (1059), Section of the Act (1039, FHA only),
    Part IV 22a (900), and 25(2) Occupancy (1065) from loan purpose and occupancy.
    Flags Agency Case # (1040), appraised value (356), and Part IV 25 fields that
    require manual completion. No-op for Conventional/USDA loans.
  los_fields_read:
  - key: loan_type
    field_id: '1172'
    field_name: Mortgage Type
    category: loan_info
    purpose: FHA/VA gate — HUD Addendum applies only to government loans
  - key: loan_purpose
    field_id: '19'
    field_name: Loan Purpose
    category: loan_info
    purpose: Purchase vs Refinance drives 25(2) Occupancy auto-select
  - key: occupancy
    field_id: '1811'
    field_name: Occupancy
    category: loan_info
    purpose: Primary vs Investment drives 25(2) Occupancy auto-select
  - key: hud_agency_type
    field_id: '1711'
    field_name: Agency Type (HUD Addendum)
    category: loan_info
    purpose: Must be HUD / FHA or VA matching loan type — auto-written when wrong/blank
  - key: fha_case_number
    field_id: '1040'
    field_name: FHA/VA Agency Case Number
    category: loan_info
    purpose: Agency Case # — info when blank (externally assigned)
  - key: hud_lender_id_code
    field_id: '1059'
    field_name: Lender ID Code (HUD Addendum)
    category: loan_info
    purpose: VA fixed ID or FHA Office ID from branch address lookup — auto-written
  - key: hud_section_of_act
    field_id: '1039'
    field_name: Section of the Act
    category: loan_info
    purpose: FHA must be 203B — auto-written when wrong/blank
  - key: hud_22a_own_sold_re
    field_id: '900'
    field_name: 22a - Own/Sold Other Real Estate
    category: loan_info
    purpose: Part IV 22a — auto-written to No when blank or incorrect
  - key: hud_occupancy_cert
    field_id: '1065'
    field_name: 25(2) Occupancy (HUD Addendum)
    category: loan_info
    purpose: Part IV 25(2) — auto-selected from loan purpose + occupancy
  - key: appraised_value
    field_id: '356'
    field_name: Appraised / Estimated Value
    category: collateral
    purpose: Part IV 25(3) — warn when blank
  - key: hud_value_determination
    field_id: '1639'
    field_name: 25 Value Determination
    category: loan_info
    purpose: Part IV 25 — info when populated (no auto-write)
  - key: hud_valuation_awareness
    field_id: '1399'
    field_name: 25 Valuation Awareness
    category: loan_info
    purpose: Part IV 25 — info when populated (no auto-write)
  - key: hud_lead_paint
    field_id: '1400'
    field_name: 25(6) HUD Only - Lead Paint
    category: loan_info
    purpose: FHA Part IV 25(6) — info when populated (no auto-write)
  - key: branch_street_address
    field_id: URLA.X188
    field_name: Company/Branch Street Address
    category: loan_info
    purpose: FHA Lender ID Code lookup by branch office address
  - key: coborrower_first_name
    field_id: '4004'
    field_name: Co-Borrower First Name
    category: borrower_info
    purpose: Co-borrower presence noted in 25(2) occupancy flag text
  doc_types: []
  rules:
  - name: HUD Addendum FHA/VA Only
    type: custom
    logic: >
      No-op when loan_type is not FHA or VA. Auto-writes Agency Type (1711),
      Lender ID (1059), Section of the Act (1039, FHA), 22a (900), and 25(2)
      Occupancy (1065). Flags blank Agency Case #, appraised value, and manual
      Part IV fields.
  flags:
  - title: HUD Addendum Not Applicable
    severity: info
    condition: Loan is Conventional or USDA — substep skipped
  - title: Agency Type Mismatch
    severity: warning
    condition: Agency Type (1711) does not match loan type before auto-write
  - title: 25(2) Occupancy Not Selected — Manual Update Required
    severity: warning
    condition: Occupancy (1065) blank and loan context insufficient to auto-select
  - title: 25(3) Appraised Value Empty
    severity: warning
    condition: Appraised Value (356) is blank on FHA/VA loan
  field_updates:
  - field_id: '1711'
    value: '{expected_agency_type}'
    condition: blank or mismatch for FHA/VA
  - field_id: '1059'
    value: '{expected_lender_id}'
    condition: blank or mismatch for FHA/VA
  - field_id: '1039'
    value: '203B'
    condition: FHA and blank or not 203B
  - field_id: '900'
    value: 'N'
    condition: blank or not No
  - field_id: '1065'
    value: '{expected_occupancy_enum}'
    condition: blank or mismatch when purpose/occupancy determinable

- id: '3.3'
  name: Review 1003 URLA Signatures
  tool: review_urla_signatures
  description: >
    Confirm the 1003 URLA is signed and dated by the applicant (borrower, and
    co-borrower when present) and by the Loan Officer / Loan Originator. Uses
    extracted signature flags and dates from the 1003 URLA document. Warn when
    any required signature or date is missing; info when all present.
  los_fields_read:
  - key: coborrower_first_name
    field_id: '4004'
    field_name: Co-Borrower First Name
    category: borrower_info
    purpose: Co-borrower signature required when co-borrower is on the loan
  doc_types:
  - document_type: 1003 URLA
    all_copies: false
    fields:
    - key: urla_signed
      purpose: Borrower/applicant signature present on 1003
    - key: borrower_signature_date
      purpose: Borrower/applicant signature date on 1003
    - key: coborrower_signature_date
      purpose: Co-borrower signature date when co-borrower present
    - key: loan_officer_signed
      purpose: Loan Officer / Originator signature present on 1003
    - key: loan_officer_signature_date
      purpose: Loan Officer / Originator signature date on 1003
  rules:
  - name: URLA Borrower and LO Signatures
    type: custom
    logic: >
      Warn when borrower signature (urla_signed) or borrower_signature_date is
      missing. When co-borrower present, warn if coborrower_signature_date blank.
      Warn when loan_officer_signed is false or loan_officer_signature_date blank.
      No-op when 1003 URLA is not in the eFolder.
  flags:
  - title: URLA Borrower Signature Missing
    severity: warning
    condition: urla_signed is false or borrower_signature_date is blank
  - title: URLA Co-Borrower Signature Missing
    severity: warning
    condition: Co-borrower on loan but coborrower_signature_date is blank
  - title: URLA Loan Officer Signature Missing
    severity: warning
    condition: loan_officer_signed is false or loan_officer_signature_date is blank
  - title: URLA Signatures Confirmed
    severity: info
    condition: All required borrower and LO signatures and dates are present

dev:
  skip: false
