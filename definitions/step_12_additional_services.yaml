step:
  id: STEP_12
  name: Order Additional Services
  phase: PREP
  description: >
    Run Ocrolus income calculation and generate Income Calc. Save results back to
    eFolder. Depends on Step 11 (eFolder cleaned first).

substeps:
- id: '12.1'
  name: Run Ocrolus and Income Calc
  tool: run_additional_services
  description: >
    Trigger Ocrolus run to process income documents (paystubs, W2s, tax returns).
    After Ocrolus completes, generate the Income Calc (1084 worksheets etc.).
    Save Income Calc PDF back to the Income Calc eFolder bucket.
  los_fields_read:
  - key: loan_type
    field_id: '1172'
    field_name: Mortgage Type
    category: loan_info
    purpose: Income calculation method may vary by loan type
  - key: base_monthly_income
    field_id: '1072'
    field_name: Gross Monthly Income - Base
    category: income
    purpose: Baseline for Ocrolus comparison
  doc_types:
  - document_type: Paystubs
    all_copies: true
    fields:
    - key: paystub_ytd
      purpose: YTD earnings for Ocrolus calculation
    - key: paystub_pay_period
      purpose: Pay period for annualization
  - document_type: W2
    all_copies: true
    fields:
    - key: w2_wages
      purpose: Prior year wages for income calculation
  - document_type: Income Calc
    all_copies: false
    fields:
    - key: income_calc_monthly
      purpose: Monthly income per Income Calc
    - key: income_calc_run_date
      purpose: Date Income Calc was generated
  rules:
  - name: Ocrolus Run Triggers Income Calc
    type: custom
    logic: >
      Run Ocrolus via the income ordering service. After completion, trigger
      Income Calc generation. Save Income Calc to eFolder Income Calc bucket.
  flags:
  - title: Ocrolus Run Failed
    severity: warning
    condition: Ocrolus run returned an error or did not complete
    suggestion: Retry Ocrolus or manually calculate income
  - title: Income Calc Not Generated
    severity: warning
    condition: Income Calc document not found in eFolder after run
    suggestion: Manually trigger Income Calc generation and save to eFolder
  field_updates: []

dev:
  skip: false
