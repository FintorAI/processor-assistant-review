step:
  id: STEP_09
  name: Transmittal Summary
  phase: FORM_UPDATES
  description: >
    Review and populate the Transmittal Summary (1008). Run Freddie Mac Condo
    Project Advisor lookup if property is a Condo. Confirm project type, project
    ID/name, note rate vs qualifying rate.

substeps:
- id: '9.1'
  name: Update Transmittal Summary
  tool: update_transmittal_summary
  description: >
    Populate the 1008 Transmittal Summary: project type, project ID, project name,
    qualifying rate. If condo, run Freddie Mac Condo Project Advisor lookup and
    populate project type (Warrantable / Non-Warrantable / Established).
    Verify note rate == qualifying rate.
  los_fields_read:
  - key: property_type
    field_id: '1041'
    field_name: Property Type
    category: property
    purpose: Condo triggers Condo Project Advisor lookup
  - key: condo_project_type
    field_id: CX.CONDO.PROJECT.TYPE
    field_name: Condo Project Type
    category: property
    purpose: Warrantable / Non-Warrantable / Established
  - key: condo_project_name
    field_id: CX.CONDO.PROJECT.NAME
    field_name: Condo Project Name
    category: property
    purpose: From Condo Project Advisor
  - key: condo_project_id
    field_id: CX.CONDO.PROJECT.ID
    field_name: Condo Project ID
    category: property
    purpose: From Condo Project Advisor
  - key: note_rate
    field_id: '3'
    field_name: Note Rate
    category: loan_info
    purpose: Must equal qualifying rate
  - key: qualifying_rate
    field_id: '799'
    field_name: Qualifying Rate
    category: loan_info
    purpose: Must equal note rate (unless ARM)
  - key: condo_assessment_status
    field_id: CX.CONDO.ASSESSMENT.STATUS
    field_name: Condo Assessment Status
    category: property
    purpose: Complete vs. Incomplete result from Freddie Mac CPA — Incomplete triggers vendor condo doc order
  doc_types:
  - document_type: Underwriting (DU / LP)
    all_copies: false
    fields:
    - key: aus_recommendation
      purpose: AUS decision (e.g. Approve/Eligible, Accept/Eligible, Refer) — surfaced to processor
    - key: aus_engine
      purpose: DU (Fannie/Conventional) or LP (Freddie) — used to confirm correct AUS was run
  rules:
  - name: Note Rate Equals Qualifying Rate
    type: field_comparison
    logic: Note rate must match the qualifying rate on the Transmittal Summary.
    check: note_rate == qualifying_rate
  flags:
  - title: Note Rate vs Qualifying Rate Mismatch
    severity: warning
    condition: Note rate doesn't match qualifying rate on Transmittal Summary
    suggestion: Reconcile rates — qualifying rate should equal note rate for fixed-rate loans
  - title: Condo Project Fields Not Populated
    severity: warning
    condition: Condo property but project type/name/ID not populated
    suggestion: Run Freddie Mac Condo Project Advisor to populate project details
  - title: Condo Assessment Incomplete
    severity: warning
    condition: Freddie Mac CPA returned Incomplete assessment status
    suggestion: Order condo docs from vendor (condoanalytics or homewisedocs) — Step 10 will handle
  field_updates: []
  rule_modifiers:
  - condition:
      field: loan_type
      equals: Conventional
    action: add
    description: >
      For Conventional/Condo: run Freddie Mac Condo Project Advisor lookup
      to determine Warrantable / Non-Warrantable / Established / etc.
    source: notes.txt
    rules:
    - name: Condo Project Advisor Lookup
      type: custom
      logic: >
        Run Freddie Mac Condo Project Advisor (FMCPA) for this property.
        Return project type, project name, and project ID.
    flags:
    - title: Condo Project Advisor Not Run
      severity: warning
      condition: Condo property without FMCPA result
      suggestion: Run Freddie Mac Condo Project Advisor lookup

dev:
  skip: false
