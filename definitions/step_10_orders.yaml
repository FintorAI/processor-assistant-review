step:
  id: STEP_10
  name: Orders
  phase: ORDERS
  description: >
    Place all required orders: (a) Appraisal — skip if collateral relief or
    AUS waiver; (b) Condo Questionnaire — skip if non-condo; (c) File Contacts
    + Title Order Email. AUS results from Step 1 inform skip conditions.

substeps:
- id: '10.1'
  name: Order Appraisal
  tool: order_appraisal
  description: >
    Order the appraisal via Encompass unless AUS collateral relief or appraisal
    waiver is active. If VA loan, appraisal cannot be waived. Reference existing
    AUS findings (read at Step 1) for waiver status.
  los_fields_read:
  - key: loan_type
    field_id: '1172'
    field_name: Mortgage Type
    category: loan_info
    purpose: VA loans cannot waive appraisal
  - key: appraisal_waiver
    field_id: CX.APPRAISAL.WAIVER
    field_name: Appraisal Waiver Flag
    category: collateral
    purpose: If True, skip appraisal order
  - key: aus_collateral_relief
    field_id: CX.AUS.COLLATERAL.RELIEF
    field_name: AUS Collateral Relief
    category: aus
    purpose: If True, skip appraisal order
  doc_types: []
  rules:
  - name: Skip If Waived
    type: custom
    logic: >
      If appraisal_waiver == True OR aus_collateral_relief == True AND loan_type != VA:
      skip appraisal order. Otherwise, order via Encompass.
  flags:
  - title: Appraisal Not Ordered
    severity: warning
    condition: Appraisal required but not yet ordered
    suggestion: Order appraisal via Encompass appraisal ordering workflow
  - title: VA Appraisal Cannot Be Waived
    severity: critical
    condition: VA loan with appraisal waiver flag active
    suggestion: Remove waiver flag — VA loans require a full appraisal
  field_updates: []
  rule_modifiers:
  - condition:
      field: loan_type
      equals: VA
    action: add
    description: VA loans always require a full appraisal — waiver is not allowed.
    source: notes.txt
    flags:
    - title: VA Loan - Appraisal Required (No Waiver)
      severity: critical
      condition: Appraisal waiver active on a VA loan
      suggestion: Remove appraisal waiver and order full VA appraisal

- id: '10.2'
  name: Order Condo Questionnaire
  tool: order_condo_questionnaire
  description: >
    Order the condo questionnaire only if the property type is Condo. Uses the
    project type from Step 9 (Transmittal Summary). Skip for non-condo properties.
  los_fields_read:
  - key: property_type
    field_id: '1041'
    field_name: Property Type
    category: property
    purpose: Only order if Condo
  - key: condo_project_type
    field_id: CX.CONDO.PROJECT.TYPE
    field_name: Condo Project Type
    category: property
    purpose: Determines questionnaire type
  doc_types: []
  rules:
  - name: Skip If Non-Condo
    type: custom
    logic: >
      If property_type != Condo, mark this substep as dynamically skipped.
      Otherwise, order the Condo Questionnaire via the ordering service.
  flags:
  - title: Condo Questionnaire Not Ordered
    severity: warning
    condition: Condo property but questionnaire not ordered
    suggestion: Order condo questionnaire for this property
  field_updates: []

- id: '10.3'
  name: File Contacts and Title Order Email
  tool: send_title_order_email
  description: >
    Update File Contacts in Encompass (Title Company, Appraiser, etc.) and send
    the title order email to the title company. Use Ash's email template.
    Recipients: Joe Salem (cc Almas Younis, Ash Desai) per recipients.json.
  los_fields_read:
  - key: title_company_name
    field_id: CX.TITLE.COMPANY.NAME
    field_name: Title Company Name
    category: file_contacts
    purpose: Title company for order email
  - key: title_company_email
    field_id: CX.TITLE.COMPANY.EMAIL
    field_name: Title Company Email
    category: file_contacts
    purpose: Email recipient for title order
  - key: property_address
    field_id: '11'
    field_name: Property Address
    category: property
    purpose: Included in title order email
  - key: borrower_last_name
    field_id: '4002'
    field_name: Borrower Last Name
    category: borrower_info
    purpose: Included in title order email subject line
  doc_types: []
  rules:
  - name: File Contacts Updated
    type: existence_check
    logic: Title company name and email must be populated before sending order email.
  flags:
  - title: Title Company Contact Missing
    severity: warning
    condition: Title company name or email not populated in File Contacts
    suggestion: Populate title company contact information before sending email
  - title: Title Order Email Not Sent
    severity: warning
    condition: Title order email was not sent
    suggestion: Send title order email to the title company
  field_updates: []

dev:
  skip: false
