step:
  id: STEP_15
  name: Processor Workflow and Closing
  phase: PROCESSOR_UPDATE
  description: >
    Update the Processor Workflow screen and Processor Closing screen.
    Covers: Conforming/Non-Del Inv. Approval, doc type, signing date,
    and wire requested date.

substeps:
- id: '15.1'
  name: Processor Workflow Update
  tool: update_processor_workflow
  description: >
    Fill out the Processor Workflow screen: select Conforming or Non-Deliverable
    Investor Approval, set doc type (wet-signed / e-sign / hybrid), and confirm
    the loan has been submitted to UW milestone.
  los_fields_read:
  - key: investor_type
    field_id: CX.INVESTOR.TYPE
    field_name: Investor Type (Conforming / Non-Del)
    category: processor_workflow
    purpose: Determines investor approval pathway
  - key: doc_type
    field_id: CX.DOC.TYPE
    field_name: Doc Type (Wet / E-sign / Hybrid)
    category: processor_workflow
    purpose: Closing doc signing method
  doc_types: []
  rules:
  - name: Investor Type Set
    type: existence_check
    logic: Conforming or Non-Deliverable investor type must be selected.
  - name: Doc Type Set
    type: existence_check
    logic: Signing doc type must be selected.
  flags:
  - title: Investor Type Not Set
    severity: warning
    condition: Investor type not selected in Processor Workflow
    suggestion: Select Conforming or Non-Deliverable Investor Approval
  - title: Doc Type Not Set
    severity: warning
    condition: Doc type not selected in Processor Workflow
    suggestion: Select Wet-Signed / E-Sign / Hybrid for this loan
  field_updates: []

- id: '15.2'
  name: Processor Closing Update
  tool: update_processor_closing
  description: >
    Fill out the Processor Closing screen: set signing date and wire requested
    date.
  los_fields_read:
  - key: signing_date
    field_id: CX.SIGNING.DATE
    field_name: Signing Date
    category: closing
    purpose: Scheduled signing date
  - key: wire_requested_date
    field_id: CX.WIRE.REQUESTED.DATE
    field_name: Wire Requested Date
    category: closing
    purpose: Date wire was requested
  doc_types: []
  rules:
  - name: Signing Date Set
    type: existence_check
    logic: Signing date must be populated on the Processor Closing screen.
  flags:
  - title: Signing Date Not Set
    severity: warning
    condition: Signing date is blank on Processor Closing screen
    suggestion: Set the signing date before proceeding to submission
  field_updates: []

dev:
  skip: false
