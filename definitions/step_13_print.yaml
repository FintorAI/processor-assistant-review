step:
  id: STEP_13
  name: Print 1003 and Transmittal
  phase: PREP
  description: >
    Print (generate PDF) of the 1008 Transmittal Summary, 2020 URLA (1003), and
    Cover Letter into the correct eFolder buckets. Note: Cover Letter is NOT
    manually placed here — it is auto-placed when Required Fields → Finished is
    clicked at Step 17.

substeps:
- id: '13.1'
  name: Print Forms to eFolder
  tool: print_forms
  description: >
    Print the following to eFolder:
    - 1008 Transmittal Summary → Transmittal Summary bucket
    - 2020 URLA → 1003 URLA bucket
    Do NOT upload Cover Letter here — it is auto-placed at Step 17 via
    Required Fields → Finished (notes.txt:219-220).
  los_fields_read:
  - key: loan_number
    field_id: '364'
    field_name: Loan Number
    category: loan_info
    purpose: Used in printed document header/footer
  doc_types: []
  rules:
  - name: Print Transmittal Summary
    type: custom
    logic: >
      Generate PDF of 1008 Transmittal Summary and upload to Transmittal Summary
      eFolder bucket.
  - name: Print 2020 URLA
    type: custom
    logic: >
      Generate PDF of 2020 URLA and upload to 1003 URLA eFolder bucket.
  flags:
  - title: Transmittal Summary Not Printed
    severity: warning
    condition: 1008 Transmittal Summary PDF not found in eFolder bucket
    suggestion: Print and upload the Transmittal Summary
  - title: 2020 URLA Not Printed
    severity: warning
    condition: 2020 URLA PDF not found in eFolder bucket
    suggestion: Print and upload the 2020 URLA
  field_updates: []

dev:
  skip: false
