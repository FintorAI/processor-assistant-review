step:
  id: STEP_10
  name: Transmittal Summary
  phase: FORM_UPDATES
  description: >
    Review and populate the Transmittal Summary (1008). Run Freddie Mac Condo
    Project Advisor lookup if property is a Condo. Confirm project type, project
    ID/name, note rate vs qualifying rate.

substeps:
- id: '10.1'
  name: Update Transmittal Summary
  tool: update_transmittal_summary
  description: >
    Review the 1008 Transmittal Summary. Checks this agent can do now:
      1. Rate check — compare Note Rate (field 3) vs Qualifying Rate (field 1014).
         Flag warning if they differ (fixed-rate loans: they should match).
      2. Project Type info — read field 1553 and flag info showing current value.
    Condo-specific fields (Project Name, CPM Project ID#) are populated by the
    computer-use agent after Freddie Mac Condo Project Advisor browser lookup.
    See ARCHITECTURE.md "Transmittal Summary — Condo Split" for details.
  los_fields_read:
  - key: note_rate
    field_id: '3'
    field_name: Note Rate
    category: loan_info
    purpose: Must equal qualifying rate for fixed-rate loans
  - key: qualifying_rate
    field_id: '1014'
    field_name: Qualifying Rate (Transmittal Summary)
    category: loan_info
    purpose: Confirmed from Encompass Transmittal Summary screen (field 1014)
  - key: project_type_1012
    field_id: '1012'
    field_name: Project Type dropdown (Transmittal Summary)
    category: property
    purpose: >
      Written when property is NOT a condo/PUD: "Other: G/Not in a Project or Development".
      Values include E/Detached, F/Attached, G/Not in a Project or Development, P/PUD, T/2-4 Unit.
  - key: property_review_type
    field_id: '1541'
    field_name: Level of Property Review (Exterior/Interior)
    category: property
    purpose: Read to surface current review type (Exterior / Interior / Full)
  - key: appraisal_form_number
    field_id: '1542'
    field_name: Appraisal Form Number
    category: property
    purpose: >
      Written based on property type: 1004 (single-family/1-unit), 1073 (condo),
      1025 (2-4 unit). Standard residential = 1004.
      NOTE: Field ID 1542 unverified against live Encompass — confirm before relying on writes.
  - key: property_form_type
    field_id: TSUM.PropertyFormType
    field_name: Property Form Type (Transmittal Summary)
    category: property
    purpose: >
      Written alongside field 1542 — standard value is
      "Uniform Residential Appraisal Report" for 1-unit non-condo.
  - key: transmittal_project_type
    field_id: '1553'
    field_name: Project Type (Transmittal Summary)
    category: property
    purpose: Read and surface for info — e.g. Established Project, New Project
  - key: property_type
    field_id: '1041'
    field_name: Property Type
    category: property
    purpose: If Condo/PUD, raise pending flag for CUA condo advisor substep
  - key: hoa_dues_monthly
    field_id: '233'
    field_name: Proposed Homeowner Assoc. Dues (Monthly)
    category: property
    purpose: >
      PUD signal — HOA dues present on a non-condo property suggests the subject
      may sit in a Planned Unit Development. Used by the PUD-detection rule.
  - key: attachment_type
    field_id: CX.ATTACHMENT.TYPE
    field_name: Attachment Type (Attached/Detached)
    category: property
    purpose: >
      PUD signal — an Attached property combined with HOA dues is a common PUD
      indicator. Used by the PUD-detection rule.
  - key: property_address
    field_id: '11'
    field_name: Property Street Address
    category: property
    purpose: Build the Zillow verification deep-link for the PUD-detection flag
  - key: property_city
    field_id: '12'
    field_name: Property City
    category: property
    purpose: Build the Zillow verification deep-link for the PUD-detection flag
  - key: property_state
    field_id: '14'
    field_name: Property State
    category: property
    purpose: Build the Zillow verification deep-link for the PUD-detection flag
  - key: property_zip
    field_id: '15'
    field_name: Property ZIP
    category: property
    purpose: Build the Zillow verification deep-link for the PUD-detection flag
  - key: condo_project_name
    field_id: CX.CONDO.PROJECT.NAME
    field_name: Condo Project Name
    category: property
    purpose: Written by CUA after Freddie Mac CPA lookup — read to check if already populated
  - key: condo_project_id
    field_id: CX.CONDO.PROJECT.ID
    field_name: Condo Project ID
    category: property
    purpose: Written by CUA after Freddie Mac CPA lookup — read to check if already populated
  doc_types: []
  rules:
  - name: Note Rate Equals Qualifying Rate
    type: field_comparison
    logic: >
      Compare field 3 (Note Rate) vs field 1014 (Qualifying Rate on Transmittal Summary).
      For fixed-rate loans they must match. Flag warning if they differ.
    check: note_rate == qualifying_rate
  - name: Condo Project Fields Pending CUA
    type: custom
    logic: >
      If property_type contains Condo or PUD and condo_project_name/id are blank,
      raise an info flag indicating condo fields await the computer-use agent
      (Freddie Mac Condo Project Advisor browser lookup).
  - name: PUD Detection
    type: custom
    logic: >
      For a non-condo property, gather PUD signals from three sources:
      (a) document-backed — the appraisal (URAR/1004) Project Type checkbox
      indicates PUD; (b) heuristic — HOA dues present (field 233) plus an Attached
      dwelling (CX.ATTACHMENT.TYPE or property_type); (c) external — Zillow public
      records via HasData (home/structure type, hasAttachedProperty, HOA dues),
      which automates the manual "Go to Zillow" check (needs HASDATA_API_KEY;
      best-effort). When any signal is present, do NOT auto-set field 1012 to
      "Not in a Project"; instead raise a flag-to-verify (warning if the appraisal
      says PUD, HOA+Attached agree, or 2+ Zillow signals; else info) with the
      Zillow listing URL (or an address deep link as fallback). No property/project
      type is auto-written — the processor confirms. When PUD indicators are present
      and the Zillow lookup returns a community/subdivision name, Project Name
      (CX.CONDO.PROJECT.NAME) is written write-only-if-blank from that subdivision.
  flags:
  - title: Note Rate vs Qualifying Rate Mismatch
    severity: warning
    condition: Note rate (field 3) doesn't match qualifying rate (field 1014)
    suggestion: Reconcile rates — qualifying rate should equal note rate for fixed-rate loans
  - title: Project Type
    severity: info
    condition: Always raised — shows current value of field 1553 for processor awareness
    suggestion: Verify project type is correct for this property
  - title: Condo Project Fields Pending — CUA Required
    severity: info
    condition: Condo/PUD property and project name/ID not yet populated
    suggestion: Computer-use agent will run Freddie Mac Condo Project Advisor to populate project name and ID
  - title: Possible PUD — Verify Property / Project Type
    severity: warning
    condition: >
      Non-condo property with PUD indicators (appraisal Project Type = PUD, or
      HOA dues present + Attached dwelling)
    suggestion: >
      Verify on Zillow whether the subject is in a Planned Unit Development; if so
      set Property Type (1041) = PUD and Project Type (1012) = "Other: P/PUD"
  field_updates: []

dev:
  skip: false
