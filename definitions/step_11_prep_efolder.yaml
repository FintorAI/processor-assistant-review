step:
  id: STEP_11
  name: Prep eFolder
  phase: PREP
  description: >
    Clean the eFolder before running Ocrolus and fresh AUS. Delete junk buckets:
    UW, MI Quote, Ocrolus Processing, Paystubs, W2. MUST run before Steps 12 and 14.

substeps:
- id: '11.1'
  name: Prep eFolder - Delete Junk Buckets
  tool: prep_efolder
  description: >
    Delete the following eFolder buckets to clear stale data before new runs:
    UW (prior AUS findings), MI Quote, Ocrolus Processing, Paystubs (old), W2 (old).
    This ensures fresh Ocrolus and AUS uploads land in clean buckets.
  los_fields_read: []
  doc_types:
  - document_type: Underwriting (DU / LP)
    all_copies: true
    fields:
    - key: aus_doc_ids
      purpose: Document IDs of existing UW/AUS docs for deletion
  - document_type: MI Quote
    all_copies: true
    fields:
    - key: mi_quote_doc_ids
      purpose: Document IDs of existing MI Quote docs for deletion
  - document_type: Ocrolus Processing
    all_copies: true
    fields:
    - key: ocrolus_doc_ids
      purpose: Document IDs of existing Ocrolus Processing docs for deletion
  - document_type: Paystubs
    all_copies: true
    fields:
    - key: paystub_doc_ids
      purpose: Document IDs of existing Paystub docs for deletion (old copies)
  - document_type: W2
    all_copies: true
    fields:
    - key: w2_doc_ids
      purpose: Document IDs of existing W2 docs for deletion (old copies)
  rules:
  - name: Delete Specified Buckets
    type: custom
    logic: >
      Delete all docs in: UW, MI Quote, Ocrolus Processing, Paystubs, W2 buckets.
      These will be repopulated by Steps 12 (Ocrolus) and 14 (fresh AUS).
  flags:
  - title: eFolder Cleanup Incomplete
    severity: warning
    condition: One or more junk buckets could not be deleted
    suggestion: Manually delete the bucket contents before running Step 12 or 14
  field_updates: []

dev:
  skip: false
