step:
  id: STEP_01
  name: Pre-Checks
  phase: INTAKE
  description: >
    Verify presence (and signing where applicable) of all docs that downstream steps
    depend on. Fails fast with a flag if any are missing. Also reads the existing AUS
    (Underwriting bucket) for collateral relief and income raw relief — AUS is required
    and flagged if absent.

substeps:
- id: '1.1'
  name: Document Presence Check
  tool: run_pre_checks
  description: >
    Check eFolder for presence (and signing) of: 1003, Borrower's Cert/Auth,
    State disclosures (e.g. MD Right of Assumption), VOE, Assets, Bank Statement,
    VOD, Driver's License (or other ID), ESS, and existing AUS (Underwriting bucket).
    Flag any missing docs as warnings/critical before proceeding.
  los_fields_read:
  - key: property_state
    field_id: '14'
    field_name: Property State
    category: property
    purpose: Determines which state-specific disclosures are required
  - key: loan_type
    field_id: '1172'
    field_name: Mortgage Type
    category: loan_info
    purpose: Determines bank statement month requirement (Conv=2mo, FHA=1mo)
  - key: appraisal_waiver
    field_id: CX.APPRAISAL.WAIVER
    field_name: Appraisal Waiver
    category: collateral
    purpose: Flags collateral relief from AUS
  doc_types:
  - document_type: 1003 URLA
    all_copies: false
    fields:
    - key: urla_signed
      purpose: Confirm borrower signature
  - document_type: Borrower's Certification & Authorization
    all_copies: false
    fields:
    - key: bca_present
      purpose: Confirm document exists and is signed
  - document_type: Underwriting (DU / LP)
    all_copies: false
    fields:
    - key: aus_collateral_relief
      purpose: Collateral relief or waiver indicator
    - key: aus_income_raw_relief
      purpose: Income raw relief indicator
    - key: aus_run_date
      purpose: Date of the AUS run (for staleness check)
  - document_type: VOE - non service provider
    all_copies: false
    fields:
    - key: voe_present
      purpose: Confirm VOE exists in eFolder
  - document_type: Paystubs
    all_copies: false
    fields:
    - key: paystubs_present
      purpose: Confirm paystubs exist in eFolder (used alongside VOE for income verification)
  - document_type: Assets
    all_copies: false
    fields:
    - key: assets_present
      purpose: Confirm assets document exists
  - document_type: Bank Statement
    all_copies: true
    fields:
    - key: bank_statement_months
      purpose: How many months of statements are present
    - key: bank_statement_dates
      purpose: Statement period dates for recency check
  - document_type: VOD
    all_copies: false
    fields:
    - key: vod_present
      purpose: Confirm VOD exists
  - document_type: Driver's License
    all_copies: false
    fields:
    - key: dl_present
      purpose: Confirm ID document exists for borrower cross-check
    - key: dl_expiry
      purpose: ID expiration date
  - document_type: Estimated Settlement Statement
    all_copies: false
    fields:
    - key: ess_present
      purpose: Confirm ESS exists in eFolder
  - document_type: Credit Report
    all_copies: false
    fields:
    - key: credit_report_present
      purpose: Confirm credit report exists in eFolder
    - key: credit_report_date
      purpose: Recency check — credit report should not be stale
    - key: fact_act_present
      purpose: FACT ACT disclosure form required per FCRA
  - document_type: MD Notice of Right to Rescind
    all_copies: false
    fields:
    - key: md_rescind_signed
      purpose: is_signed — MD Right to Rescind eSigned by borrower
  - document_type: MD DUAL CAPACITY IN REAL ESTATE
    all_copies: false
    fields:
    - key: md_dual_cap_signed
      purpose: is_signed — MD Dual Capacity disclosure eSigned by borrower
  - document_type: MD Important Notice Regarding Counseling
    all_copies: false
    fields:
    - key: md_counseling_signed
      purpose: is_signed — MD Housing Counseling notice eSigned by borrower
  - document_type: MD Notice Regarding Right for Assumption
    all_copies: false
    fields:
    - key: md_assumption_signed
      purpose: is_signed — MD Right for Assumption notice eSigned by borrower
  - document_type: MD Right to Choose Insurance Provider
    all_copies: false
    fields:
    - key: md_ins_provider_signed
      purpose: is_signed — MD Right to Choose Insurance Provider eSigned by borrower
  - document_type: MD Settlement Services/Right to Choose
    all_copies: false
    fields:
    - key: md_settlement_signed
      purpose: is_signed — MD Settlement Services/Right to Choose eSigned by borrower
  - document_type: Flood Certificate
    all_copies: false
    fields:
    - key: flood_cert_present
      purpose: Confirm flood certificate exists in eFolder
    - key: flood_zone
      purpose: Flood zone designation (X = no flood; A/V = flood zone); gates condo Q order
  - document_type: Evidence of Hazard Insurance
    all_copies: false
    fields:
    - key: hazard_insurance_present
      purpose: Confirm homeowners insurance deck page is in file
    - key: hazard_insurance_expiry
      purpose: Policy expiration date — must not be expired at closing
  - document_type: Title Report
    all_copies: false
    fields:
    - key: title_report_present
      purpose: Confirm title report exists in eFolder
    - key: title_legal_description
      purpose: Legal description — alternate source for condo project name alongside Purchase Agreement
  - document_type: LDP
    all_copies: false
    fields:
    - key: ldp_present
      purpose: Loan Defect Prevention document present
  - document_type: General Letter of Explanation
    all_copies: false
    fields:
    - key: loe_present
      purpose: LOE present when flagged deposits or employment gaps require explanation
    - key: loe_topics
      purpose: Topics covered (e.g. ZEL deposits, employment gap) for submission notes
  rules:
  - name: Required Docs Present
    type: existence_check
    logic: >
      All listed docs must exist in eFolder. Flag each missing one as warning or
      critical based on downstream dependency severity.
  - name: AUS Required
    type: existence_check
    logic: >
      Existing AUS (Underwriting bucket) must be present. If missing, flag as
      critical — orders at Step 10 depend on AUS findings.
  - name: Bank Statement Recency
    type: value_check
    logic: >
      If Conventional, require 2 months of bank statements. If FHA, require 1 month.
      Flag if fewer than required months are present.
    check: bank_statement_months >= required_months_by_loan_type
  - name: DL Not Expired
    type: value_check
    logic: Driver's License expiry must be >= today.
    check: dl_expiry >= today
  flags:
  - title: Missing Required Document
    severity: critical
    condition: Any of the required documents is absent from the eFolder
    suggestion: Locate or request the missing document before proceeding
  - title: AUS Missing
    severity: critical
    condition: No Underwriting (DU/LP) document found in eFolder
    suggestion: Run AUS or retrieve existing results before ordering
  - title: Insufficient Bank Statements
    severity: warning
    condition: Fewer bank statement months than required for loan type
    suggestion: Request additional statements from borrower
  - title: ID Expired
    severity: warning
    condition: Driver's License expiration date is before today
    suggestion: Request a valid, non-expired government ID from borrower
  - title: State Disclosure Missing
    severity: warning
    condition: State-specific disclosure document not found in eFolder
    suggestion: Locate and add the required state disclosure
  - title: Credit Report Missing
    severity: critical
    condition: Credit report not found in eFolder
    suggestion: Obtain and upload credit report before proceeding
  - title: FACT ACT Disclosure Missing
    severity: warning
    condition: FACT ACT disclosure form not found within credit report
    suggestion: Confirm FACT ACT form is included in the credit report package
  - title: Flood Certificate Missing
    severity: warning
    condition: Flood certificate not found in eFolder
    suggestion: Order or obtain flood certificate for the subject property
  - title: Hazard Insurance Missing
    severity: warning
    condition: Evidence of hazard insurance not found in eFolder
    suggestion: Request homeowners insurance deck page from borrower or agent
  - title: Title Report Missing
    severity: warning
    condition: Title report not found in eFolder
    suggestion: Request title report from title company
  - title: LDP Missing
    severity: warning
    condition: Loan Defect Prevention document not found in eFolder
    suggestion: Obtain LDP before submission
  field_updates: []
  rule_modifiers:
  - condition:
      field: state
      equals: MD
    action: add
    description: >
      Maryland requires the "Notice Regarding Right for Assumption Under
      Certain Circumstances" disclosure. Flag if missing.
    source: notes.txt:14
    flags:
    - title: MD Right of Assumption Disclosure Missing
      severity: warning
      condition: MD Right of Assumption notice not found in eFolder
      suggestion: Add MD disclosure before submission

- id: '1.2'
  name: File Contacts Check
  tool: review_file_contacts
  description: >
    Verify that the four key file contacts are assigned in Encompass:
    Buyer's Agent, Seller's Agent, Seller 1, and Escrow Company.
    Flag missing contacts as warnings so they can be linked before orders are placed.
  los_fields_read:
  - key: seller_1_name
    field_id: '638'
    field_name: Seller 1 Name
    category: transaction
    purpose: Seller 1 full name — cross-check against SELLER contact type
  - key: escrow_case_number
    field_id: '186'
    field_name: 'Escrow Case #'
    category: file_contacts
    purpose: Escrow Company Escrow Case # — current value before writing the settlement File #
  rules:
  - name: Required Contacts Present
    type: existence_check
    logic: >
      Buyer's Agent, Seller's Agent, Seller 1 (SELLER contact type), and Escrow Company
      must all be assigned to the loan in Encompass. Flag each missing contact as a warning.
  flags:
  - title: Missing File Contact
    severity: warning
    condition: One or more required contacts not linked to the loan
    suggestion: Go to File Contacts in Encompass and add the missing contact
  field_updates: []

- id: '1.3'
  name: Property Verification (Address + Listing / PUD)
  tool: review_property_listing
  description: >
    Consolidate property verification into Pre-Checks: (1) USPS Address API v3
    deliverability check + Purchase Contract street-number cross-check (moved
    from former STEP_00 0.5); (2) live Zillow/HasData public-records lookup for
    PUD signals (home/structure type, attached, HOA, subdivision) and
    new-construction (year_built / isNewConstruction); (3) store both results
    in state so Transmittal Summary (11.1), FHA Management (12.1), and HUD
    Transmittal (12.2) can consume them without re-querying. Flag-only —
    no Encompass writes in Pre-Checks.
  los_fields_read:
  - key: property_address
    field_id: '11'
    field_name: Property Street Address
    category: property
    purpose: USPS validation + Zillow listing keyword / deep-link
  - key: property_city
    field_id: '12'
    field_name: Property City
    category: property
    purpose: USPS validation + Zillow listing keyword / deep-link
  - key: property_state
    field_id: '14'
    field_name: Property State
    category: property
    purpose: USPS validation + Zillow listing keyword / deep-link
  - key: property_zip
    field_id: '15'
    field_name: Property ZIP
    category: property
    purpose: USPS validation + Zillow listing keyword / deep-link
  - key: property_type
    field_id: '1041'
    field_name: Property Type
    category: property
    purpose: Encompass PUD / condo signal for the PUD-detection rule
  - key: hoa_dues_monthly
    field_id: '233'
    field_name: Proposed Homeowner Assoc. Dues (Monthly)
    category: property
    purpose: PUD signal — HOA dues present on a non-condo property
  - key: attachment_type
    field_id: CX.ATTACHMENT.TYPE
    field_name: Attachment Type (Attached/Detached)
    category: property
    purpose: PUD signal — Attached dwelling combined with HOA dues
  - key: condo_project_name
    field_id: '1298'
    field_name: Condo Project Name (Transmittal Summary)
    category: property
    purpose: Read so downstream 11.1 knows whether Project Name is already set
  - key: construction_status
    field_id: '1067'
    field_name: Construction Status
    category: property
    purpose: >
      Read current Construction Status so the new-construction flag only fires
      when 1067 is blank or Existing — consumed later by HUD Transmittal 12.2
  doc_types:
  - document_type: Purchase Agreement
    all_copies: false
    fields:
    - key: purchase_property_address
      purpose: Cross-check USPS / LOS street number against the Purchase Contract
  rules:
  - name: Address Deliverability
    type: custom
    logic: >
      Call USPS Address Validation API v3 against the LOS subject-property
      address. Flag warning when the address is not deliverable (DPV not in
      Y/S/D) or when the LOS street number disagrees with the Purchase Contract.
      Stores the full result in state['address_validation'] for downstream
      tools (review_borrower_summary, review_flood_hazard_insurance,
      build_action_items).
  - name: PUD Detection
    type: custom
    logic: >
      Gather PUD signals from three sources: (a) document-backed — appraisal
      URAR Project Type checkbox indicates PUD; (b) heuristic — HOA dues
      (field 233) plus an Attached dwelling (CX.ATTACHMENT.TYPE or
      property_type); (c) external — Zillow public records via HasData
      (home/structure type, hasAttachedProperty, HOA dues), which automates
      the manual "Go to Zillow" check (needs HASDATA_API_KEY; best-effort).
      Raise a flag-to-verify (warning if appraisal says PUD, HOA+Attached
      agree, or 2+ Zillow signals; else info). Stores the full signal dict
      under state['property_verification']['pud'] for Transmittal Summary
      11.1 and FHA Management 12.1.
  - name: New Construction Signal
    type: custom
    logic: >
      When Zillow year_built is within the last calendar year (or Zillow's
      isNewConstruction boolean is True), raise an info flag citing the
      year_built and listing URL. Stores the result under
      state['property_verification']['new_construction'] for HUD Transmittal
      12.2 to override Construction Status (field 1067) from the default
      ExistingConstruction to New.
  flags:
  - title: Address Undeliverable
    severity: warning
    condition: USPS DPV confirmation is not Y/S/D for the subject property address
    suggestion: Correct the property address in Encompass against the Purchase Contract / USPS
  - title: Possible PUD — Verify Property / Project Type
    severity: warning
    condition: >
      Non-condo property with strong PUD indicators (appraisal Project Type =
      PUD, or HOA dues + Attached, or 2+ Zillow signals)
    suggestion: >
      Verify on Zillow whether the subject is in a Planned Unit Development; if so
      set Property Type (1041) = PUD and Project Type (1012) = "Other: P/PUD"
  - title: Possible PUD — Weak Indicators (Verify)
    severity: info
    condition: Non-condo property with only weak PUD hints (HOA-only or one Zillow signal)
    suggestion: Confirm the subject is not in a PUD via the listing / appraisal
  - title: Possible New Construction — Verify
    severity: info
    condition: Zillow year_built is within the last calendar year (or isNewConstruction=True)
    suggestion: >
      Confirm Construction Status (field 1067) — HUD Transmittal 12.2 will attempt
      to write "New" when blank if this signal is present
  - title: Property Listing Facts
    severity: info
    condition: Zillow/HasData returned a match (even with no PUD / new-construction signal)
    suggestion: No action needed — facts stored in state for downstream tools
  field_updates: []

dev:
  skip: false
