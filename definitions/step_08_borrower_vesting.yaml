step:
  id: STEP_08
  name: Borrower Info - Vesting
  phase: FORM_UPDATES
  description: >
    Review and populate the Borrower Information - Vesting screen. Confirm occupancy
    intent, vesting (marital status from URLA Part 1), and click Build Final Vesting.

substeps:
- id: '8.1'
  name: Update Borrower Vesting
  tool: update_borrower_vesting
  description: >
    Verify occupancy intent, populate vesting description from URLA Part 1
    (married/unmarried/single). Build and confirm the Final Vesting string
    (e.g. "WILL OCCUPY / A SINGLE WOMAN OR UNMARRIED WOMAN").
    Click Build Final Vesting when complete.
  los_fields_read:
  - key: occupancy
    field_id: '1811'
    field_name: Occupancy / Occupancy Intent
    category: loan_info
    purpose: Will Occupy / Will Not Occupy
  - key: marital_status
    field_id: '479'
    field_name: Borrower Marital Status
    category: borrower_info
    purpose: Married / Unmarried / Separated
  - key: vesting_description
    field_id: CX.VESTING.DESCRIPTION
    field_name: Vesting Description
    category: title
    purpose: Current vesting text
  - key: final_vesting
    field_id: CX.FINAL.VESTING
    field_name: Final Vesting
    category: title
    purpose: Built vesting string — confirm after Build Final Vesting click
  - key: coborrower_first_name
    field_id: '4004'
    field_name: Co-Borrower First Name
    category: borrower_info
    purpose: Determine if Joint vesting applies
  doc_types: []
  rules:
  - name: Vesting Consistent with Marital Status
    type: custom
    logic: >
      If single/unmarried and no co-borrower: Sole Ownership, unmarried/single
      vesting language. If married: appropriate joint vesting or sole ownership
      with spousal signature.
  - name: Final Vesting Built
    type: existence_check
    logic: Final Vesting field must be populated after the Build Final Vesting action.
  flags:
  - title: Vesting Description Not Set
    severity: warning
    condition: Vesting description field is empty
    suggestion: Populate vesting description from marital status before building
  - title: Final Vesting Not Built
    severity: warning
    condition: Final Vesting field is empty after update
    suggestion: Click Build Final Vesting in Encompass
  field_updates:
  - field_id: CX.VESTING.DESCRIPTION
    value: '{computed_vesting_description}'
    condition: always

dev:
  skip: false
