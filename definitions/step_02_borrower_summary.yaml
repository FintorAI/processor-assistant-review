step:
  id: STEP_02
  name: Borrower Summary - Origination
  phase: DATA_REVIEW
  description: >
    Verify AND populate every field in the Borrower Summary / Origination screen.
    Covers ID expiration, property address verification against listing, credit score,
    subject property details, loan amount, and AMI / Affordable Loan Eligibility.

substeps:
- id: '2.1'
  name: Review Borrower Summary - Origination
  tool: review_borrower_summary
  description: >
    Walk through the Borrower Summary – Origination screen. Check every field for
    completeness (cell phone = home phone if empty). Verify ID is not expired.
    Cross-check subject property address against listing (Google). Confirm credit
    score, loan amount, and AMI / Affordable Loan Eligibility fields.
  los_fields_read:
  # ── Borrower identity ──────────────────────────────────────────────
  - key: borrower_first_name
    field_id: '4000'
    field_name: Borrower First Name
    category: borrower_info
    purpose: Completeness check
  - key: borrower_middle_name
    field_id: '4001'
    field_name: Borrower Middle Name
    category: borrower_info
    purpose: Completeness check
  - key: borrower_last_name
    field_id: '4002'
    field_name: Borrower Last Name
    category: borrower_info
    purpose: Completeness check
  - key: borrower_name_suffix
    field_id: '4003'
    field_name: Borrower Name Suffix
    category: borrower_info
    purpose: Completeness check
  - key: borrower_ssn
    field_id: '65'
    field_name: Borrower SSN
    category: borrower_info
    purpose: Completeness check
  - key: borrower_dob
    field_id: '1402'
    field_name: Borrower Date of Birth
    category: borrower_info
    purpose: Used with ID expiry cross-check
  - key: borrower_home_phone
    field_id: '66'
    field_name: Borrower Home Phone
    category: borrower_info
    purpose: Fallback for cell phone if cell is empty
  - key: borrower_work_phone
    field_id: '1715'
    field_name: Borrower Business/Work Phone
    category: borrower_info
    purpose: Completeness check — needs live field ID validation
  - key: borrower_cell_phone
    field_id: '1490'
    field_name: Borrower Cell Phone
    category: borrower_info
    purpose: If empty, copy from home phone (field 66)
  - key: borrower_accept_sms
    field_id: '4920'
    field_name: Borrower Accept Text/SMS
    category: borrower_info
    purpose: Auto-check if unchecked — required for text communications
  - key: borrower_email
    field_id: '1240'
    field_name: Borrower Email
    category: borrower_info
    purpose: Completeness check
  - key: borrower_marital_status
    field_id: '52'
    field_name: Borrower Marital Status
    category: borrower_info
    purpose: Completeness check; also drives vesting at Step 8
  - key: borrower_dependents_count
    field_id: '53'
    field_name: Borrower Dependents Count
    category: borrower_info
    purpose: Completeness check
  - key: borrower_dependent_ages
    field_id: '54'
    field_name: Borrower Dependent Ages
    category: borrower_info
    purpose: Completeness check
  # ── Co-borrower identity (read when coborrower is present) ─────────
  - key: coborrower_first_name
    field_id: '4004'
    field_name: Co-Borrower First Name
    category: borrower_info
    purpose: Completeness check if coborrower present
  - key: coborrower_last_name
    field_id: '4006'
    field_name: Co-Borrower Last Name
    category: borrower_info
    purpose: Completeness check if coborrower present
  - key: coborrower_ssn
    field_id: '97'
    field_name: Co-Borrower SSN
    category: borrower_info
    purpose: Completeness check if coborrower present
  - key: coborrower_dob
    field_id: '1403'
    field_name: Co-Borrower Date of Birth
    category: borrower_info
    purpose: ID expiry cross-check for coborrower
  - key: coborrower_home_phone
    field_id: '98'
    field_name: Co-Borrower Home Phone
    category: borrower_info
    purpose: Completeness check if coborrower present
  - key: coborrower_work_phone
    field_id: '1716'
    field_name: Co-Borrower Business/Work Phone
    category: borrower_info
    purpose: Completeness check if coborrower present — needs live field ID validation
  - key: coborrower_cell_phone
    field_id: '1480'
    field_name: Co-Borrower Cell Phone
    category: borrower_info
    purpose: Completeness check if coborrower present
  - key: coborrower_accept_sms
    field_id: '4935'
    field_name: Co-Borrower Accept Text/SMS
    category: borrower_info
    purpose: Auto-check if unchecked and coborrower is present
  - key: coborrower_email
    field_id: '1179'
    field_name: Co-Borrower Email
    category: borrower_info
    purpose: Completeness check if coborrower present
  - key: coborrower_marital_status
    field_id: '84'
    field_name: Co-Borrower Marital Status
    category: borrower_info
    purpose: Completeness check if coborrower present
  # ── Credit scores — Borrower ────────────────────────────────────────
  - key: credit_score
    field_id: '1168'
    field_name: Credit Score (Middle)
    category: credit
    purpose: Confirm middle credit score is populated
  - key: experian_score
    field_id: '67'
    field_name: Borrower Experian/FICO Score
    category: credit
    purpose: Flag if blank
  - key: transunion_score
    field_id: '1450'
    field_name: Borrower TransUnion/Empirica Score
    category: credit
    purpose: Flag if blank
  - key: equifax_score
    field_id: '1414'
    field_name: Borrower Equifax/Beacon Score
    category: credit
    purpose: Flag if blank
  # ── Credit scores — Co-Borrower ─────────────────────────────────────
  - key: coborrower_experian_score
    field_id: '60'
    field_name: Co-Borrower Experian/FICO Score
    category: credit
    purpose: Flag if blank when co-borrower is present
  - key: coborrower_transunion_score
    field_id: '1452'
    field_name: Co-Borrower TransUnion/Empirica Score
    category: credit
    purpose: Flag if blank when co-borrower is present
  - key: coborrower_equifax_score
    field_id: '1415'
    field_name: Co-Borrower Equifax/Beacon Score
    category: credit
    purpose: Flag if blank when co-borrower is present
  # ── Credit decision / reference ─────────────────────────────────────
  - key: credit_score_decision
    field_id: VASUMM.X23
    field_name: Credit Score for Decision Making
    category: credit
    purpose: Flag if blank — used by both borrower and co-borrower
  - key: credit_reference_number
    field_id: '300'
    field_name: Credit Reference Number
    category: credit
    purpose: Flag if blank
  # ── Subject property ───────────────────────────────────────────────
  - key: property_address
    field_id: '11'
    field_name: Property Street Address
    category: property
    purpose: Verified against online listing and Purchase Contract
  - key: property_address_urla
    field_id: URLA.X73
    field_name: Property Street Address (URLA Lender — editable)
    category: property
    purpose: >
      Editable version of property street address on 1003 URLA Lender form.
      Used as primary source when field 11 is read-only. Used for cash-out refi
      current address comparison.
  # ── Borrower Current Address (for cash-out refi occupancy check) ───────
  - key: borr_present_addr
    field_id: FR0126
    field_name: Borrower Present Street Address
    category: borrower_info
    purpose: Cash-out refi check — compare to subject property address
  - key: borr_present_city
    field_id: FR0106
    field_name: Borrower Present City
    category: borrower_info
    purpose: Cash-out refi occupancy check
  - key: borr_present_state
    field_id: FR0107
    field_name: Borrower Present State
    category: borrower_info
    purpose: Cash-out refi occupancy check
  - key: borr_present_zip
    field_id: FR0108
    field_name: Borrower Present ZIP
    category: borrower_info
    purpose: Cash-out refi occupancy check
  - key: property_city
    field_id: '12'
    field_name: Property City
    category: property
    purpose: Address verification
  - key: property_county
    field_id: '13'
    field_name: Property County
    category: property
    purpose: Full address verification
  - key: property_state
    field_id: '14'
    field_name: Property State
    category: property
    purpose: Address verification
  - key: property_zip
    field_id: '15'
    field_name: Property ZIP
    category: property
    purpose: Address verification
  # ── Loan info ──────────────────────────────────────────────────────
  - key: loan_purpose
    field_id: '19'
    field_name: Loan Purpose
    category: loan_info
    purpose: Purchase confirmation
  - key: loan_amount
    field_id: '1109'
    field_name: Loan Amount
    category: loan_info
    purpose: Confirm loan amount matches Purchase Contract
  - key: appraised_value
    field_id: '356'
    field_name: Appraised Value
    category: collateral
    purpose: If empty, copy estimated_value into this field (pre-appraisal fill)
  - key: estimated_value
    field_id: '1821'
    field_name: Estimated Value
    category: collateral
    purpose: Compare against purchase price from Purchase Contract; copy to 356 if 356 is empty
  - key: los_purchase_price
    field_id: '136'
    field_name: Purchase Price (LOS)
    category: loan_info
    purpose: Cross-check LOS purchase price against purchase price extracted from Purchase Contract
  # ── Transaction Details ────────────────────────────────────────────
  - key: lender
    field_id: '1264'
    field_name: Lender
    category: loan_info
    purpose: Must be "All Western Mortgage Inc."
  - key: loan_program
    field_id: '1401'
    field_name: Loan Program
    category: loan_info
    purpose: Presence check; info flag
  - key: closing_cost_program
    field_id: '1785'
    field_name: Closing Cost Program
    category: loan_info
    purpose: Cross-check against loan purpose (19) for purchase/refi mismatch
  - key: loan_number
    field_id: '364'
    field_name: Loan Number
    category: loan_info
    purpose: Presence check; warning if empty
  - key: mers_min
    field_id: '1051'
    field_name: MERS MIN
    category: loan_info
    purpose: Info flag
  # ── Loan Info (Occupancy / Type / Term) ────────────────────────────
  - key: occupancy
    field_id: '1811'
    field_name: Property Will Be (Occupancy)
    category: loan_info
    purpose: Presence check; info flag
  - key: loan_type
    field_id: '1172'
    field_name: Loan Type
    category: loan_info
    purpose: Presence check; info flag
  - key: lien_position
    field_id: '420'
    field_name: Lien Position
    category: loan_info
    purpose: Presence check; info flag
  - key: amort_type
    field_id: '608'
    field_name: Amortization Type
    category: loan_info
    purpose: Presence check; info flag
  - key: loan_term_months
    field_id: '4'
    field_name: Loan Term (Months)
    category: loan_info
    purpose: Presence check; info flag
  - key: term_due_in_months
    field_id: '325'
    field_name: Term Due In (Months)
    category: loan_info
    purpose: Presence check; info flag
  # ── Rates ──────────────────────────────────────────────────────────
  - key: note_rate
    field_id: '3'
    field_name: Note Rate
    category: loan_info
    purpose: Presence check; warning if empty
  - key: qualifying_rate
    field_id: '1014'
    field_name: Qualifying Rate
    category: loan_info
    purpose: Presence check; warning if empty
  - key: undiscounted_rate
    field_id: '3293'
    field_name: Undiscounted Rate
    category: loan_info
    purpose: Presence check; info flag
  # ── Payments / Income ──────────────────────────────────────────────
  - key: monthly_payment
    field_id: '5'
    field_name: Monthly Payment (P&I)
    category: loan_info
    purpose: Presence check; warning if empty
  - key: total_monthly_payment
    field_id: '912'
    field_name: Total Monthly Payment
    category: loan_info
    purpose: Presence check; warning if empty
  - key: monthly_income
    field_id: '736'
    field_name: Monthly Income
    category: income
    purpose: Presence check; warning if empty
  # ── Down Payment ───────────────────────────────────────────────────
  - key: down_payment_pct
    field_id: '1771'
    field_name: Down Payment %
    category: loan_info
    purpose: Cross-check down_payment_pct × purchase_price vs field 1335 (down payment amount)
  - key: down_payment_amount
    field_id: '1335'
    field_name: Down Payment Amount
    category: loan_info
    purpose: Verify matches down_payment_pct × purchase_price
  # ── Lock / Rate Dates ──────────────────────────────────────────────
  - key: rate_is_locked
    field_id: '2400'
    field_name: Rate Is Locked (Y/N)
    category: loan_info
    purpose: Authoritative lock indicator; drives date validation logic
  - key: lock_date
    field_id: '761'
    field_name: Lock Date
    category: loan_info
    purpose: Required if locked; must match last rate set date
  - key: lock_days
    field_id: '432'
    field_name: Lock Period (# of Days)
    category: loan_info
    purpose: Presence check if locked
  - key: lock_expires
    field_id: '762'
    field_name: Lock Expiration Date
    category: loan_info
    purpose: Presence check if locked
  - key: last_rate_set_date
    field_id: '3253'
    field_name: Last Rate Set Date
    category: loan_info
    purpose: Must be today if unlocked; must match lock date if locked
  - key: rate_lock_disclosure_date
    field_id: '3259'
    field_name: Rate Lock Disclosure Date
    category: loan_info
    purpose: Must be today if locked; can be blank if unlocked
  - key: est_closing_date
    field_id: '763'
    field_name: Est Closing Date
    category: closing
    purpose: Presence check; warning if empty
  - key: borrower_est_closing_date
    field_id: '4114'
    field_name: Borrower Est Closing Date
    category: closing
    purpose: Presence check; warning if empty
  - key: secondary_registration
    field_id: '3941'
    field_name: Secondary Registration
    category: loan_info
    purpose: Presence check; info flag
  # ── Grant / AMI ────────────────────────────────────────────────────
  - key: ami_eligibility
    field_id: CX.AMI.ELIGIBILITY
    field_name: AMI / Affordable Loan Eligibility
    category: grant_program
    purpose: Check AMI eligibility flag for grant programs
  doc_types:
  - document_type: Driver's License
    all_copies: false
    fields:
    - key: dl_expiry
      purpose: Government ID expiration date
    - key: dl_name
      purpose: Name on ID for borrower cross-check
  - document_type: Purchase Agreement
    all_copies: false
    fields:
    - key: purchase_price
      purpose: Verify property address and purchase price match
    - key: purchase_property_address
      purpose: Property address as listed in Purchase Contract
  rules:
  - name: All Required Fields Populated
    type: existence_check
    logic: >
      Every mandatory field on the Borrower Summary screen must be populated.
      If cell phone is empty, copy value from home phone.
  - name: ID Not Expired
    type: value_check
    logic: Government ID expiration must be >= today.
    check: dl_expiry >= today
  - name: Property Address Consistent
    type: field_comparison
    logic: >
      Property address in Encompass should match the listing and Purchase Contract.
      Flag any mismatch.
  - name: Loan Amount Positive
    type: value_check
    logic: Loan amount must be greater than zero.
    check: loan_amount > 0
  flags:
  - title: Required Field Empty
    severity: warning
    condition: A mandatory Borrower Summary field is blank
    suggestion: Populate the missing field before proceeding
  - title: Borrower ID Expired
    severity: warning
    condition: Government ID expiration date is before today
    suggestion: Request a valid government-issued ID from the borrower
  - title: Co-Borrower ID Expired
    severity: warning
    condition: Co-borrower government ID expiration date is before today
    suggestion: Request a valid government-issued ID from the co-borrower
  - title: Property Address Mismatch
    severity: warning
    condition: Encompass address doesn't match listing or Purchase Contract
    suggestion: Correct the property address and flag for Lock Desk if needed
  - title: Loan Amount Missing
    severity: critical
    condition: Loan amount is zero or blank
    suggestion: Enter the correct loan amount before proceeding
  - title: Credit Score Missing
    severity: critical
    condition: Middle credit score is blank
    suggestion: Ensure credit has been pulled and scores are populated in Encompass
  - title: Email Missing
    severity: warning
    condition: Borrower email is blank
    suggestion: Obtain and enter borrower email address
  - title: Co-Borrower Email Missing
    severity: warning
    condition: Co-borrower email is blank when co-borrower is present
    suggestion: Obtain and enter co-borrower email address
  field_updates:
  - field_id: '1490'
    value: '{borrower_home_phone}'
    condition: borrower_cell_phone is empty
  - field_id: '4920'
    value: 'true'
    condition: borrower_accept_sms is unchecked
  - field_id: '4935'
    value: 'true'
    condition: coborrower_accept_sms is unchecked and coborrower is present

dev:
  skip: false
